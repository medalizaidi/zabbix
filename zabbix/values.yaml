# ─────────────────────────────────────────
# Namespace
# ─────────────────────────────────────────
namespace: tooling

# ─────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────
ingress:
  enabled: true
  className: nginx              # change to "azure/application-gateway" for AKS with App Gateway
  host: zabbix.example.com      # change to your domain
  path: /
  pathType: Prefix
  servicePort: 80
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: false              # set to true to enable HTTPS
    secretName: zabbix-tls

# ─────────────────────────────────────────
# Zabbix (subchart values)
# ─────────────────────────────────────────
zabbix:
  zabbixServer:
    enabled: true

  zabbixWeb:
    enabled: true
    service:
      type: ClusterIP           # ingress handles external access
      port: 80

  zabbixWebService:
    enabled: true

  zabbixProxy:
    enabled: false              # enable if monitoring remote networks

  zabbixAgent:
    enabled: true
    runAsDaemonSet: true        # deploy agent on every node

  kube-state-metrics:
    enabled: true               # K8s cluster metrics

  postgresql:
    enabled: true
    auth:
      username: zabbix
      password: zabbix          # change in production!
      database: zabbix